include ./themes/Catppuccin-Mocha.conf

# Font
font_family      "CodeNewRoman Nerd Font Mono"
bold_font        auto
italic_font      auto
font_size        9

# Cursor
cursor_shape     block
cursor_blink_interval 0

# Performance
enable_audio_bell no
repaint_delay    10
input_delay      3
sync_to_monitor  yes

# Scrollback
scrollback_lines 10000

# Disable transparency (prevents flash issues)
background_opacity 1.0

# Window
window_padding_width 8
confirm_os_window_close 0

# Clipboard
copy_on_select yes
strip_trailing_spaces smart

# URL handling
detect_urls yes

# Remove `kitty` built-in padding
window_padding_width 0
