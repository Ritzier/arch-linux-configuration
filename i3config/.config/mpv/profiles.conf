[ultra-fast]
profile-desc="Extreme performance"

hwdec=auto
scale=bilinear
cscale=bilinear
dscale=bilinear

deband=no
sigmoid-upscaling=no

interpolation=no
video-sync=audio

dither=no

[fast]
profile-desc="Balanced performance"

hwdec=auto-copy

scale=bilinear
cscale=bilinear

deband=no
interpolation=no
video-sync=audio

[quality]
profile-desc="High quality"

hwdec=auto
vd-lavc-threads=8

scale=ewa_lanczossharp
cscale=ewa_lanczossharp
dscale=mitchell

sigmoid-upscaling=yes
deband=yes

video-sync=display-resample
interpolation=no
